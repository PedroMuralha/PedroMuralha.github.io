<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Muralha | Contato</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">pedro muralha</a>
        </div>
        
        <div class="controles-topo">
            <button id="btn-tema" aria-label="Mudar tema">
                <svg class="icone-lua" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg class="icone-sol" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <button id="btn-idioma" aria-label="Alternar Idioma">EN</button>
            <button id="btn-menu" aria-label="Abrir menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>

        <nav id="menu-navegacao">
            <ul class="menu">
                <li><a href="index.html"><span class="lang-pt">Início</span><span class="lang-en">Home</span></a></li>
                <li><a href="projetos.html"><span class="lang-pt">Projetos</span><span class="lang-en">Projects</span></a></li>
                <li><a href="curriculo.html"><span class="lang-pt">Currículo</span><span class="lang-en">Resume</span></a></li>
                <li><a href="contato.html" class="ativo"><span class="lang-pt">Contato</span><span class="lang-en">Contact</span></a></li>
            </ul>
        </nav>
    </header>

    <main class="container-contato">
        <div class="box-contato">
            <ul class="lista-contatos">
                <li><a href="mailto:pedroparanhos@poli.ufrj.br">pedroparanhos@poli.ufrj.br</a></li>
                <li><a href="https://github.com/PedroMuralha" target="_blank">github.com/PedroMuralha</a></li>
                <li><a href="https://instagram.com/pedro_muralha" target="_blank">instagram.com/pedro_muralha</a></li>
                <li><a href="https://www.linkedin.com/in/pedro-muralha" target="_blank">linkedin.com/in/pedro-muralha</a></li>
            </ul>
        </div>
    </main>

    <script>
        const btnMenu = document.getElementById('btn-menu');
        const menuNavegacao = document.getElementById('menu-navegacao');
        btnMenu.addEventListener('click', () => menuNavegacao.classList.toggle('mostrar'));

        const body = document.body;

        const btnTema = document.getElementById('btn-tema');
        const aplicarTema = (tema) => {
            body.classList.remove('light-mode', 'dark-mode');
            if (tema) body.classList.add(tema);
        };
        const temaSalvo = localStorage.getItem('tema-escolhido');
        if (temaSalvo) aplicarTema(temaSalvo);

        btnTema.addEventListener('click', () => {
            let novoTema = body.classList.contains('dark-mode') ? 'light-mode' : 'dark-mode';
            aplicarTema(novoTema);
            localStorage.setItem('tema-escolhido', novoTema);
        });

        const btnIdioma = document.getElementById('btn-idioma');
        const idiomaSalvo = localStorage.getItem('idioma-escolhido');
        if (idiomaSalvo === 'en') {
            body.classList.add('modo-ingles');
            if(btnIdioma) btnIdioma.textContent = 'PT';
        }

        if(btnIdioma) {
            btnIdioma.addEventListener('click', () => {
                body.classList.toggle('modo-ingles');
                if (body.classList.contains('modo-ingles')) {
                    btnIdioma.textContent = 'PT';
                    localStorage.setItem('idioma-escolhido', 'en');
                } else {
                    btnIdioma.textContent = 'EN';
                    localStorage.setItem('idioma-escolhido', 'pt');
                }
            });
        }
    </script>
</body>
</html>
